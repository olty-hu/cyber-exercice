<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Page de test</title>
</head>
<body>
  <h1>Bienvenue</h1>
  <p>Vous avez cliqué sur le lien renseigné dans un mail d'Olivier Le Tilly. Il s'agit d'un test pour évaluer le risque de cyber-attaque. Vous pouvez fermer la page.</p>

  <!-- Compteur de visites -->
<h2>Nombre de visites :</h2>

<img src="https://visitor-badge.laobi.icu/badge?page_id=cyber-exercice" />

  <script>
let count = localStorage.getItem('visits') || 0;
count++;
localStorage.setItem('visits', count);
document.write("Visites (locales) : " + count);
</script>

  <script>
if (!localStorage.getItem('visited')) {
  localStorage.setItem('visited', 'true');

  let uniques = localStorage.getItem('uniqueCount') || 0;
  uniques++;
  localStorage.setItem('uniqueCount', uniques);
}

document.write("Utilisateur unique (local) : " + (localStorage.getItem('uniqueCount') || 1));
</script>

</body>
</html>
